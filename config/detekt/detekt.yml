build:
  maxIssues: 0

complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  ComplexCondition:
    threshold: 6
  TooManyFunctions:
    thresholdInFiles: 30
    thresholdInClasses: 30

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 150
  ReturnCount:
    max: 5
  UnusedPrivateMember:
    active: true

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

formatting:
  active: false

